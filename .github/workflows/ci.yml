name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run unit tests
        run: >
          mvn -B -q
          -pl app/backend/xxxx-application,app/backend/xxxx-controller,app/backend/xxxx-infrastructure
          -am test
      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"

  backend-integration-test:
    name: Backend Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: backend-unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run integration tests (Testcontainers)
        run: >
          mvn -B -q
          -pl app/backend/xxxx-start -am
          -Dflashsale.integration=true test
      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-surefire-reports
          path: "**/target/surefire-reports/"

  backend-build:
    name: Backend Package
    runs-on: ubuntu-latest
    needs: backend-unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Package backend JAR
        run: >
          mvn -B -q
          -pl app/backend/xxxx-start -am
          -DskipTests package
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: app/backend/xxxx-start/target/*.jar

  frontend-checks:
    name: Frontend Lint & Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
