name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run unit tests
        run: >
          mvn -B -q
          -pl app/backend/xxxx-application,app/backend/xxxx-controller,app/backend/xxxx-infrastructure
          -am test
      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"

  backend-integration-test:
    name: Backend Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: backend-unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run integration tests (Testcontainers)
        run: >
          mvn -B -q
          -pl app/backend/xxxx-start -am
          -Dflashsale.integration=true test
      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-surefire-reports
          path: "**/target/surefire-reports/"

  backend-build:
    name: Backend Package
    runs-on: ubuntu-latest
    needs: backend-unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Package backend JAR
        run: >
          mvn -B -q
          -pl app/backend/xxxx-start -am
          -DskipTests package
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: app/backend/xxxx-start/target/*.jar

  frontend-checks:
    name: Frontend Lint & Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  observability-smoke:
    name: Observability Smoke Test
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Start backend and verify observability endpoints
        run: |
          JAR=$(find app/backend/xxxx-start/target -name "*.jar" -not -name "*-sources.jar" | head -1)
          if [ -z "$JAR" ]; then
            echo "No JAR found — downloading from build artifact"
            JAR="app/backend/xxxx-start/target/xxxx-start-1.0-SNAPSHOT.jar"
          fi
          java -jar "$JAR" &
          PID=$!
          echo "Backend PID=$PID, waiting for startup..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:1122/actuator/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done

          echo "=== Health endpoint ==="
          curl -s http://localhost:1122/actuator/health

          echo ""
          echo "=== Prometheus metrics (JVM) ==="
          curl -s http://localhost:1122/actuator/prometheus | grep -E "jvm_memory|jvm_gc|flashsale"

          echo ""
          echo "=== Verify log format includes traceId ==="
          # Make a request to generate log output
          curl -s http://localhost:1122/actuator/health > /dev/null
          sleep 1
          # Check application log for traceId in pipe-delimited format
          LOG_DIR="$HOME/MyEventApplication/logs"
          if [ -f "$LOG_DIR/application.log" ]; then
            LOG_LINE=$(tail -1 "$LOG_DIR/application.log")
            echo "Last log line: $LOG_LINE"
            # Verify pipe-delimited format with 6 fields (date|thread|traceId|level|logger|msg)
            FIELD_COUNT=$(echo "$LOG_LINE" | awk -F'|' '{print NF}')
            if [ "$FIELD_COUNT" -ge 5 ]; then
              echo "PASS: Log format has $FIELD_COUNT pipe-delimited fields"
            else
              echo "FAIL: Log format has only $FIELD_COUNT fields, expected >= 5"
              exit 1
            fi
          else
            echo "WARN: Application log file not found at $LOG_DIR/application.log"
            echo "Check console output for log format..."
          fi

          kill $PID 2>/dev/null || true
