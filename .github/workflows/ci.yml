name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ═══════════════════════════════════════════════════════════
  # BLOCK 1: BACKEND — Unit → Integration / Build → Observability
  # ═══════════════════════════════════════════════════════════
  backend-unit-test:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run unit tests
        run: >
          mvn -B -q
          -pl app/backend/xxxx-application,app/backend/xxxx-controller,app/backend/xxxx-infrastructure
          -am test
      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/"

  backend-integration-test:
    name: Backend — Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: backend-unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Verify Docker is available
        run: |
          docker version
          docker info --format '{{.OSType}} {{.ServerVersion}} {{.MemTotal}}'
      - name: Cache Testcontainers Docker layers
        uses: actions/cache@v4
        with:
          path: ~/.cache/testcontainers
          key: testcontainers-${{ runner.os }}-${{ hashFiles('app/backend/**/pom.xml') }}
          restore-keys: |
            testcontainers-${{ runner.os }}-
      - name: Run integration tests (Testcontainers)
        id: integration-tests
        run: >
          mvn -B
          -pl app/backend/xxxx-start -am
          -Dflashsale.integration=true
          test 2>&1 | tee maven-integration-test.log
        continue-on-error: true
      - name: Show Maven output on failure
        if: steps.integration-tests.outcome == 'failure'
        run: |
          echo "=== Maven Integration Test Output (last 200 lines) ==="
          tail -200 maven-integration-test.log || true
          echo "=== Test Failures ==="
          grep -E "(ERROR|FAILURE|Failed|Caused by)" maven-integration-test.log || true
          exit 1
      - name: Upload Maven log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-integration-log
          path: maven-integration-test.log
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-surefire-reports
          path: "**/target/surefire-reports/"

  backend-build:
    name: Backend — Package JAR
    runs-on: ubuntu-latest
    needs: backend-unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Package backend JAR
        run: >
          mvn -B -q
          -pl app/backend/xxxx-start -am
          -DskipTests package
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: app/backend/xxxx-start/target/*.jar

  observability-smoke:
    name: Backend — Observability Smoke Test
    runs-on: ubuntu-latest
    needs: backend-build
    env:
      KAFKA_BOOTSTRAP_SERVERS: ""
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: app/backend/xxxx-start/target
      - name: Start MySQL + Redis with init SQL
        run: |
          docker compose -f environment/docker-compose-dev.yml up -d mysql redis
          echo "Waiting for MySQL to accept connections..."
          for i in $(seq 1 60); do
            if docker logs pre-event-mysql 2>&1 | grep -q "ready for connections"; then
              echo "MySQL ready after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: MySQL did not become ready"
              docker logs pre-event-mysql
              exit 1
            fi
            sleep 1
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            if docker exec pre-event-redis redis-cli ping 2>&1 | grep -q PONG; then
              echo "Redis ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo "=== MySQL tables ==="
          docker exec pre-event-mysql mysql -uroot -proot1234 -e "SHOW TABLES;" vetautet || true
      - name: Verify JAR artifact
        run: |
          echo "=== Downloaded artifact contents ==="
          ls -lh app/backend/xxxx-start/target/
          JAR=$(find app/backend/xxxx-start/target -name "*.jar" -not -name "*-sources.jar" | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR found in artifact!"
            exit 1
          fi
          echo "JAR file: $JAR"
          echo "JAR size: $(stat --format='%s' "$JAR") bytes"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Start backend and verify observability endpoints
        id: smoke
        run: |
          set -e
          JAR=$(find app/backend/xxxx-start/target -name "*.jar" -not -name "*-sources.jar" | head -1)
          echo "Starting backend with JAR: $JAR"
          java -jar "$JAR" > /tmp/backend-stdout.log 2> /tmp/backend-stderr.log &
          PID=$!
          echo "Backend PID=$PID, waiting for startup..."

          READY=0
          for i in $(seq 1 90); do
            if curl -sf http://localhost:1122/actuator/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              READY=1
              break
            fi
            if ! kill -0 $PID 2>/dev/null; then
              echo "ERROR: Backend process died at ${i}s"
              echo "=== stdout (last 80 lines) ==="
              tail -80 /tmp/backend-stdout.log
              echo "=== stderr (last 80 lines) ==="
              tail -80 /tmp/backend-stderr.log
              exit 1
            fi
            sleep 1
          done

          if [ "$READY" -eq 0 ]; then
            echo "ERROR: Backend did not start within 90s"
            echo "=== stdout (last 80 lines) ==="
            tail -80 /tmp/backend-stdout.log
            echo "=== stderr (last 80 lines) ==="
            tail -80 /tmp/backend-stderr.log
            exit 1
          fi

          echo "=== Health endpoint ==="
          curl -s http://localhost:1122/actuator/health

          echo ""
          echo "=== Prometheus metrics (JVM) ==="
          curl -s http://localhost:1122/actuator/prometheus | grep -E "jvm_memory|jvm_gc|flashsale" || echo "WARN: No matching metrics found"

          echo ""
          echo "=== Verify log format includes traceId ==="
          curl -s http://localhost:1122/actuator/health > /dev/null
          sleep 1
          LOG_DIR="$HOME/MyEventApplication/logs"
          if [ -f "$LOG_DIR/application.log" ]; then
            LOG_LINE=$(tail -1 "$LOG_DIR/application.log")
            echo "Last log line: $LOG_LINE"
            FIELD_COUNT=$(echo "$LOG_LINE" | awk -F'|' '{print NF}')
            if [ "$FIELD_COUNT" -ge 5 ]; then
              echo "PASS: Log format has $FIELD_COUNT pipe-delimited fields"
            else
              echo "FAIL: Log format has only $FIELD_COUNT fields, expected >= 5"
              exit 1
            fi
          else
            echo "WARN: Application log file not found at $LOG_DIR/application.log"
            echo "Check console output for log format..."
          fi

          kill $PID 2>/dev/null || true
      - name: Upload startup logs on failure
        if: failure() && steps.smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-startup-logs
          path: |
            /tmp/backend-stdout.log
            /tmp/backend-stderr.log
      - name: Cleanup containers
        if: always()
        run: docker compose -f environment/docker-compose-dev.yml down -v 2>/dev/null || true

  # ═══════════════════════════════════════════════════════════
  # BLOCK 2: FRONTEND — Lint → Typecheck → Build
  # ═══════════════════════════════════════════════════════════
  frontend-checks:
    name: Frontend — Lint, Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  # ═══════════════════════════════════════════════════════════
  # BLOCK 3: INFRA — Validate configs (docker-compose, ELK, Prometheus, Nginx, Redis)
  # ═══════════════════════════════════════════════════════════
  infra-validate:
    name: Infra — Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose-dev.yml
        run: docker compose -f environment/docker-compose-dev.yml config --quiet

      - name: Validate docker-compose-nginx.yml
        run: docker compose -f environment/docker-compose-nginx.yml config --quiet

      - name: Validate docker-compose-cluster.yml
        run: docker compose -f environment/cluster-redis/docker-compose-cluster.yml config --quiet

      - name: Validate Prometheus config
        run: |
          docker run --rm --entrypoint promtool \
            -v ${{ github.workspace }}/environment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro \
            prom/prometheus:latest check config /etc/prometheus/prometheus.yml

      - name: Validate ELK configs
        run: |
          python3 -c "import yaml; yaml.safe_load(open('environment/elk/elasticsearch.yml'))" && echo "elasticsearch.yml OK"
          python3 -c "import yaml; yaml.safe_load(open('environment/elk/logstash.yml'))" && echo "logstash.yml OK"
          python3 -c "import yaml; yaml.safe_load(open('environment/elk/kibana.yml'))" && echo "kibana.yml OK"
          test -f environment/elk/pipeline/logstash.conf && echo "logstash.conf present"

      - name: Validate Nginx config structure
        run: |
          grep -q "listen" environment/nginx/conf.d/app.conf && echo "listen directive OK" || echo "WARN: listen directive missing"
          grep -q "server_name\|location" environment/nginx/conf.d/app.conf && echo "server/location directives present"
          echo "Nginx config file: $(wc -l < environment/nginx/conf.d/app.conf) lines"

      - name: Validate Redis Sentinel config
        run: |
          grep -q "sentinel monitor" environment/cluster-redis/sentinel.conf && echo "sentinel monitor OK" || echo "WARN: sentinel monitor missing"
          grep -q "sentinel down-after-milliseconds" environment/cluster-redis/sentinel.conf && echo "sentinel timeout OK"
