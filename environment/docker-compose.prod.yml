# Production docker-compose using pre-built GHCR images.
# Images are built and pushed by .github/workflows/cd.yml on every push to master.
#
# Usage:
#   docker compose -f environment/docker-compose.prod.yml up -d

networks:
  flashsale-network:
    driver: bridge

services:
  # ── Data layer ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: flashsale-mysql
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d/
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vetautet}
    ports:
      - "${MYSQL_PORT:-3316}:3306"
    networks:
      - flashsale-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6319}:6379"
    networks:
      - flashsale-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.0
    container_name: flashsale-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "${KAFKA_PORT:-9094}:9092"
    networks:
      - flashsale-network

  # ── Application layer ───────────────────────────────────
  backend:
    image: ghcr.io/qwan30/flashsale-backend:latest
    container_name: flashsale-backend
    restart: unless-stopped
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/vetautet
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${BACKEND_PORT:-1122}:1122"
    networks:
      - flashsale-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/qwan30/flashsale-frontend:latest
    container_name: flashsale-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - flashsale-network
    depends_on:
      - backend

volumes:
  mysql_data:
